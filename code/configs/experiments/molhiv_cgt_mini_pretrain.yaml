# @package _global_
defaults:
  - /config
  - override /tokenization: graph_lvl/ogbg_molhiv_cgt
  - _self_

# GraphGPT-Mini CGT pre-training on ogbg-molhiv.
# CGT uses deterministic canonical serialization with causal next-token prediction.
training:
  output_dir: "./checkpoints/molhiv/pretrain_cgt_mini"
  pretrain_cpt: ""
  task_type: "pretrain-ntp"
  deepspeed_conf_file: ""
  batch_size: 1
  pack_tokens: 1
  max_length: 10240
  num_workers: 8
  valid_percent: 0
  do_generation: false
  pt_eval_only: false
  do_infer: false
  tot_samples: 1000
  schedule:
    total_tokens: 2e8
    warmup_tokens: 2e7
    logging_steps: 100
    steps_per_saving: 1000
  optimizer:
    lr: 3e-4
    min_lr: 0
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1e-8
    max_grad_norm: 1
    use_ema: false

model:
  model_type: "graphgpt"
  hidden_size: 256
  intermediate_size: 1024
  num_hidden_layers: 4
  num_attention_heads: 4
  hidden_act: "gelu"
  causal_attention: true
  max_position_embeddings: 1024
  graph_input:
    stack_method: "short"
    stacked_feat_agg_method: "gated"
  dropout_settings:
    attention_dropout: 0.1
    path_dropout: 0
    embed_dropout: 0
    mlp_dropout: 0
  layer_scale_init_value: 0
