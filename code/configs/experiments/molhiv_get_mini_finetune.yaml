# @package _global_
defaults:
  - /config
  - override /tokenization: graph_lvl/ogbg_molhiv
  - _self_

# GraphGPT-Mini GET fine-tuning on ogbg-molhiv.
# Seeds and output_dir are normally supplied by examples/graph_lvl/molhiv_supervised.sh.
training:
  output_dir: "./checkpoints/molhiv/finetune_get_mini_seed0"
  pretrain_cpt: "./checkpoints/molhiv/pretrain_get_mini"
  task_type: "graph"
  deepspeed_conf_file: ""
  batch_size: 64
  batch_size_eval: 64
  max_length: 1024
  num_workers: 8
  num_workers_eval: 8
  optimizer:
    lr: 2e-4
    min_lr: 1e-6
    betas: [0.9, 0.99]
    eps: 1e-10
    weight_decay: 0.01
    max_grad_norm: 1
    use_ema: false
  schedule:
    epochs: 50
    warmup_epochs: 5
    logging_steps: 100
  finetune:
    seed: 0
    freeze: -1
    task_ratio: 1
  ft_eval:
    save_pred: false
    save_final_predictions: true
    save_hidden_states: false
    eval_only: false
    infer_only: false
    save_best_by_valid: true
    test_once_after_train: true
    skip_test_during_train: true
    early_stopping_patience: 10
    epoch_per_eval: 1
    k_samplers: 4096
    true_valid: -1

model:
  model_type: "graphgpt"
  hidden_size: 256
  intermediate_size: 1024
  num_hidden_layers: 4
  num_attention_heads: 4
  hidden_act: "gelu"
  causal_attention: false
  max_position_embeddings: 1024
  graph_input:
    stack_method: "short"
    stacked_feat_agg_method: "gated"
  ft_head:
    problem_type: "multi_label_classification"
    num_labels: 1
    pooling_method: "last"
    mlp: [256]
    dropout: 0.1
    loss_type: null
    task_ratio: 1
  dropout_settings:
    attention_dropout: 0.1
    path_dropout: 0.1
    embed_dropout: 0
    mlp_dropout: 0
  layer_scale_init_value: 1
