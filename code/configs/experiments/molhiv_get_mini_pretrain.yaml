# @package _global_
defaults:
  - /config
  - override /tokenization: graph_lvl/ogbg_molhiv
  - _self_

# GraphGPT-Mini GET pre-training on ogbg-molhiv.
# The molhiv DatasetSpec uses OGB's scaffold train split only for pre-training.
training:
  output_dir: "./checkpoints/molhiv/pretrain_get_mini"
  pretrain_cpt: ""
  task_type: "pretrain-mlm"  # GraphGPT's scheduled masked-token prediction path.
  deepspeed_conf_file: ""
  batch_size: 1
  pack_tokens: 1
  max_length: 10240
  num_workers: 8
  valid_percent: 0
  do_generation: false
  pt_eval_only: false
  do_infer: false
  tot_samples: 1000
  pretrain_mlm:
    name: "polynomial"
    params:
      fixed_ratio: 0.7
      power: 1
      mtp: [1, 0, 0]
      umr_clip: [0.01, 0.99]
    dlm_wgt: false
    num_gen_samples: 128
  schedule:
    # molhiv has ~32.9k train molecules, far smaller than PCQM4Mv2.
    # 200M tokens is the midpoint of the requested 100M-300M molhiv budget.
    total_tokens: 2e8
    warmup_tokens: 2e7
    logging_steps: 100
    steps_per_saving: 1000
  optimizer:
    lr: 3e-4
    min_lr: 0
    betas: [0.9, 0.95]
    weight_decay: 0.1
    eps: 1e-8
    max_grad_norm: 1
    use_ema: false

model:
  model_type: "graphgpt"
  hidden_size: 256
  intermediate_size: 1024
  num_hidden_layers: 4
  num_attention_heads: 4
  hidden_act: "gelu"
  causal_attention: false
  max_position_embeddings: 1024
  graph_input:
    stack_method: "short"
    stacked_feat_agg_method: "gated"
  dropout_settings:
    attention_dropout: 0.1
    path_dropout: 0
    embed_dropout: 0
    mlp_dropout: 0
  layer_scale_init_value: 0

